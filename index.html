<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gửi Người Anh Yêu Thương ❤️</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Trang web tỏ tình lãng mạn tích hợp hiệu ứng sao băng, pháo hoa trái tim và tương tác cảm ứng cực sống động.">
  <meta name="keywords" content="tỏ tình, love confession, love web, hiệu ứng trái tim, sao băng, pháo hoa">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Outfit:wght@300;400;600;700;800&family=Playpen+Sans:wght@500;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- GSAP for smooth animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            cursive: ['Caveat', 'cursive'],
            handwritten: ['Playpen Sans', 'sans-serif'],
          },
          colors: {
            sweetpink: '#ff758f',
            deeppurple: '#4a154b',
            neoncyan: '#06b6d4',
          }
        }
      }
    }
  </script>

  <style>
    /* Custom CSS Styles */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0b0c10;
      color: #ffffff;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    /* Custom Glassmorphism styling */
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    @keyframes borderGlow {
      0%, 100% { border-color: rgba(255, 117, 143, 0.4); box-shadow: 0 0 15px rgba(255, 117, 143, 0.2); }
      50% { border-color: rgba(6, 182, 212, 0.7); box-shadow: 0 0 25px rgba(6, 182, 212, 0.4); }
    }
    .animated-border {
      animation: borderGlow 4s infinite alternate;
      border-width: 2px;
    }
    @keyframes pulseYes {
      0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(255, 117, 143, 0.65); }
      50% { transform: scale(1.06); box-shadow: 0 0 25px rgba(255, 117, 143, 0.95); }
    }
    .pulse-yes {
      animation: pulseYes 1.8s infinite ease-in-out;
    }

    /* Glowing effects */
    .neon-glow-pink {
      box-shadow: 0 0 20px rgba(255, 117, 143, 0.6), inset 0 0 10px rgba(255, 117, 143, 0.3);
    }
    
    .neon-glow-cyan {
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.6), inset 0 0 10px rgba(6, 182, 212, 0.3);
    }

    .neon-text-pink {
      text-shadow: 0 0 8px rgba(255, 117, 143, 0.8), 0 0 20px rgba(255, 117, 143, 0.4);
    }

    @keyframes wingFlap {
      0%, 100% { transform: translateY(0) scale(1) rotate(-8deg); }
      50% { transform: translateY(-8px) scale(1.08) rotate(8deg); }
    }
    .animate-wing-flap {
      animation: wingFlap 1.0s infinite ease-in-out;
      display: inline-block;
    }

    /* Chibi running couple animations */
    .animate-leg-left {
      transform-origin: 35px 68px;
      animation: runLegLeft 0.4s infinite alternate ease-in-out;
    }
    .animate-leg-right {
      transform-origin: 35px 68px;
      animation: runLegRight 0.4s infinite alternate ease-in-out;
    }
    .animate-leg-left-boy2 {
      transform-origin: 65px 68px;
      animation: runLegLeft 0.4s infinite alternate ease-in-out;
    }
    .animate-leg-right-boy2 {
      transform-origin: 65px 68px;
      animation: runLegRight 0.4s infinite alternate ease-in-out;
    }

    @keyframes runLegLeft {
      0% { transform: rotate(-28deg); }
      100% { transform: rotate(28deg); }
    }
    @keyframes runLegRight {
      0% { transform: rotate(28deg); }
      100% { transform: rotate(-28deg); }
    }
    @keyframes chibiBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .animate-chibi-bob {
      animation: chibiBob 0.2s infinite ease-in-out;
    }
    .animate-road-scroll {
      animation: roadScroll 1.0s infinite linear;
    }
    @keyframes roadScroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* Finale: Sakura petal rain */
    @keyframes petalFall {
      0%   { transform: translateY(-60px) rotate(0deg) translateX(0); opacity: 0; }
      10%  { opacity: 1; }
      80%  { opacity: 0.85; }
      100% { transform: translateY(110vh) rotate(720deg) translateX(40px); opacity: 0; }
    }
    .sakura-petal {
      position: fixed;
      top: -60px;
      pointer-events: none;
      z-index: 60;
      font-size: 1.1rem;
      animation: petalFall linear infinite;
    }

    /* Finale: glowing love message */
    @keyframes loveTextReveal {
      0%   { opacity: 0; letter-spacing: 0.35em; filter: blur(18px); }
      60%  { opacity: 1; letter-spacing: 0.12em; filter: blur(1px); }
      100% { opacity: 1; letter-spacing: 0.12em; filter: blur(0); }
    }
    @keyframes loveTextFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }
    @keyframes shimmerText {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }
    .finale-love-text {
      background: linear-gradient(90deg,
        #ff758f 0%, #ffcdd2 20%,
        #fff 40%, #c084fc 60%,
        #ffcdd2 80%, #ff758f 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmerText 3s linear infinite, loveTextFloat 3.5s ease-in-out infinite;
      filter: drop-shadow(0 0 18px rgba(255,117,143,0.7));
    }
    @keyframes heartFireworkBurst {
      0%   { transform: scale(0.1) rotate(-20deg); opacity: 1; }
      70%  { transform: scale(1.3) rotate(15deg); opacity: 0.9; }
      100% { transform: scale(1.8) rotate(0deg); opacity: 0; }
    }
    .finale-sub-text {
      animation: loveTextFloat 4s ease-in-out infinite;
    }

    /* Dynamic gradient backgrounds */
    .dynamic-bg {
      background: linear-gradient(135deg, #090a0f, #1b0f24, #2a0827, #071720);
      background-size: 400% 400%;
      animation: gradientShift 20s ease infinite;
    }

    .story-bg {
      background: linear-gradient(-45deg, #23153c, #160a22, #471131, #0c2533);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Custom scrollbar just in case */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 117, 143, 0.5);
      border-radius: 10px;
    }

    /* Envelope animation styling */
    .envelope-wrapper {
      perspective: 1000px;
    }

    .envelope {
      position: relative;
      width: 280px;
      height: 180px;
      background: #ff5c7a;
      border-radius: 0 0 8px 8px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.5s;
    }

    .envelope::before {
      content: '';
      position: absolute;
      top: 0;
      z-index: 2;
      border-left: 140px solid transparent;
      border-right: 140px solid transparent;
      border-top: 100px solid #ff758f;
      transform-origin: top;
      transition: transform 0.4s 0.2s, z-index 0.2s;
    }

    .envelope::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 140px solid #ff4766;
      border-right: 140px solid #ff4766;
      border-bottom: 90px solid #ff3d5e;
      border-top: 90px solid transparent;
      border-radius: 0 0 8px 8px;
      z-index: 3;
    }

    .letter {
      position: absolute;
      bottom: 10px;
      left: 15px;
      width: 250px;
      height: 150px;
      background: #fff;
      border-radius: 4px;
      z-index: 1;
      transition: transform 0.5s 0.1s;
      padding: 15px;
      box-sizing: border-box;
    }

    /* Envelope open states */
    .envelope.open::before {
      transform: rotateX(180deg);
      z-index: 0;
    }

    .envelope.open .letter {
      transform: translateY(-80px);
      z-index: 2;
    }

    .envelope.open {
      animation: floatEnvelope 3s ease-in-out infinite alternate;
    }

    @keyframes floatEnvelope {
      0% { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(-10px) rotate(1deg); }
    }

    /* Heartbeat animation for photo frame */
    .heart-beat {
      animation: heartbeat 2s infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1) rotate(-5deg); }
      50% { transform: scale(1.05) rotate(-3deg); }
    }

    /* Pulsing heart icon on envelope */
    .envelope-heart {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -30%);
      z-index: 4;
      font-size: 2.5rem;
      color: #ffffff;
      text-shadow: 0 0 15px rgba(255,255,255,0.8);
      animation: pulse 1.2s infinite;
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -30%) scale(1); }
      50% { transform: translate(-50%, -30%) scale(1.2); }
    }
  </style>
</head>
<body class="dynamic-bg select-none">

  <!-- Canvases for 60fps - 120fps effects -->
  <!-- 1. Background meteor shower canvas -->
  <canvas id="meteor-canvas" class="absolute inset-0 pointer-events-none z-0"></canvas>
  <!-- 2. Touch/Mouse trail canvas -->
  <canvas id="trail-canvas" class="absolute inset-0 pointer-events-none z-10"></canvas>
  <!-- 3. Fireworks canvas (active on success) -->
  <canvas id="fireworks-canvas" class="absolute inset-0 pointer-events-none z-50"></canvas>

  <!-- Audio Element -->
  <audio id="bg-music" loop preload="auto">
    <source src="" type="audio/mpeg">
  </audio>

  <!-- Giai đoạn 1: Mở màn bất ngờ (The Hook) -->
  <div id="hook-view" class="absolute inset-0 flex flex-col justify-center items-center z-30 transition-opacity duration-1000 px-6">
    <div class="text-center mb-12 max-w-md animate-pulse">
      <h2 class="font-sans font-extrabold text-2xl md:text-3xl text-transparent bg-clip-text bg-gradient-to-r from-sweetpink to-neoncyan tracking-wide mb-3">
        BẠN CÓ MỘT BỨC THƯ BÍ MẬT
      </h2>
      <p class="font-sans text-sm md:text-base text-gray-400">
        Hãy chạm vào trái tim để mở bức thư tình... ✨
      </p>
    </div>

    <!-- Interactive Glowing Envelope -->
    <div class="envelope-wrapper my-8 relative" id="envelope-trigger" style="opacity: 0;">
      <!-- Left Carrier Firefly -->
      <div id="left-carrier" class="absolute -top-20 -left-16 flex flex-col items-center pointer-events-none select-none z-10" style="opacity: 0;">
        <div class="relative flex items-center justify-center animate-wing-flap">
          <!-- Glowing firefly body -->
          <div class="w-5 h-5 bg-[#eaff8c] rounded-full shadow-[0_0_15px_#eaff8c] animate-pulse"></div>
          <!-- Transparent wings -->
          <div class="absolute w-3 h-4 bg-white/40 rounded-full -translate-x-3.5 -translate-y-2 rotate-12"></div>
          <div class="absolute w-3 h-4 bg-white/40 rounded-full translate-x-3.5 -translate-y-2 -rotate-12"></div>
        </div>
        <!-- Dashed string connecting firefly to envelope top-left -->
        <svg class="w-16 h-20 overflow-visible -mt-1">
          <path d="M 12 0 Q 36 30 52 70" fill="none" stroke="#eaff8c" stroke-width="2" stroke-dasharray="4,4" />
        </svg>
      </div>

      <!-- Right Carrier Firefly -->
      <div id="right-carrier" class="absolute -top-20 -right-16 flex flex-col items-center pointer-events-none select-none z-10" style="opacity: 0;">
        <div class="relative flex items-center justify-center animate-wing-flap" style="animation-delay: 0.3s;">
          <!-- Glowing firefly body -->
          <div class="w-5 h-5 bg-[#eaff8c] rounded-full shadow-[0_0_15px_#eaff8c] animate-pulse"></div>
          <!-- Transparent wings -->
          <div class="absolute w-3 h-4 bg-white/40 rounded-full -translate-x-3.5 -translate-y-2 rotate-12"></div>
          <div class="absolute w-3 h-4 bg-white/40 rounded-full translate-x-3.5 -translate-y-2 -rotate-12"></div>
        </div>
        <!-- Dashed string connecting firefly to envelope top-right -->
        <svg class="w-16 h-20 overflow-visible -mt-1" style="transform: scaleX(-1);">
          <path d="M 12 0 Q 36 30 52 70" fill="none" stroke="#eaff8c" stroke-width="2" stroke-dasharray="4,4" />
        </svg>
      </div>

      <div class="envelope" id="main-envelope">
        <div class="envelope-heart">❤️</div>
        <div class="letter shadow-inner flex flex-col justify-center items-center text-center">
          <span class="font-handwritten text-deeppurple text-xs font-bold leading-tight" id="envelope-inside-text">
            Gửi người quan trọng nhất...
          </span>
          <div class="w-12 h-0.5 bg-sweetpink my-2 opacity-50"></div>
          <span class="font-cursive text-sweetpink text-lg font-bold">Open Me</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Giai đoạn 2: Lời tỏ tình chính thức (The Story) -->
  <div id="story-view" class="absolute inset-0 flex flex-col items-center justify-between z-20 opacity-0 pointer-events-none transition-all duration-1000 py-8 px-6 md:py-12">
    <!-- Heart-shaped Photo Frame -->
    <div class="w-full flex justify-center mt-2 md:mt-4">
      <div class="relative w-40 h-40 md:w-48 md:h-48 heart-beat">
        <!-- SVG heart clip path frame -->
        <div class="absolute inset-0 bg-gradient-to-tr from-sweetpink via-purple-500 to-neoncyan rounded-full p-1.5 shadow-2xl neon-glow-pink" style="clip-path: path('M12 4.419C12 4.419 10.082 0 6 0 2.686 0 0 2.686 0 6c0 6.643 9.771 12.871 12 14 2.229-1.129 12-7.357 12-14 0-3.314-2.686-6-6-6-4.082 0-6 4.419-6 4.419z'); transform: scale(6.2) translate(1.4px, 1.2px) scale(0.15);">
          <div class="w-full h-full bg-[#160a22]" style="clip-path: path('M12 4.419C12 4.419 10.082 0 6 0 2.686 0 0 2.686 0 6c0 6.643 9.771 12.871 12 14 2.229-1.129 12-7.357 12-14 0-3.314-2.686-6-6-6-4.082 0-6 4.419-6 4.419z');">
            <!-- Target Photo -->
            <img id="target-photo" src="" alt="Người ấy" class="w-full h-full object-cover">
          </div>
        </div>
        <!-- Little floating heart badges -->
        <span class="absolute -top-1 -right-1 text-2xl animate-bounce" style="animation-delay: 0.5s">💖</span>
        <span class="absolute bottom-2 -left-2 text-xl animate-bounce" style="animation-delay: 1.2s">✨</span>
      </div>
    </div>

    <!-- Letter Glass Card & Typing Content -->
    <div class="w-full max-w-md glass-card animated-border rounded-3xl p-6 md:p-8 flex flex-col justify-center items-center text-center relative z-20 my-4">
      <h3 class="font-sans font-bold text-xl md:text-2xl text-sweetpink tracking-wide mb-3 neon-text-pink">
        Gửi <span id="target-name-placeholder">...</span> ❤️
      </h3>
      <div class="w-20 h-0.5 bg-gradient-to-r from-sweetpink to-neoncyan mb-4"></div>
      
      <!-- Box with typing animation text -->
      <div class="min-h-[120px] flex items-center justify-center">
        <p id="confession-text-box" class="font-handwritten text-sm md:text-base leading-relaxed text-gray-200 text-left w-full"></p>
      </div>
    </div>

    <!-- Giai đoạn 3: Lời quyết định (The Choice) -->
    <div id="choice-container" class="w-full max-w-sm flex justify-center items-center gap-6 px-4 mb-4 relative z-30">
      <!-- YES Button -->
      <button id="yes-btn" class="flex-1 bg-gradient-to-r from-sweetpink to-red-500 hover:from-red-400 hover:to-sweetpink text-white font-sans font-extrabold py-3.5 px-6 rounded-full text-base md:text-lg shadow-lg transform transition-all duration-300 active:scale-95 neon-glow-pink hover:scale-105 pulse-yes">
        ĐỒNG Ý ❤️
      </button>

      <!-- NO Button (The Runner) -->
      <button id="no-btn" class="flex-1 bg-gray-800/80 hover:bg-gray-700/80 text-gray-400 font-sans font-semibold py-3.5 px-6 rounded-full text-base md:text-lg border border-gray-600/50 shadow-md transform transition-all duration-200 active:scale-95">
        TỪ CHỐI 💔
      </button>
    </div>
  </div>

  <!-- Giai đoạn cuối: Thành công & Hiệu ứng Chữ (The Final Screen) -->
  <div id="success-view" class="absolute inset-0 flex flex-col justify-end items-center z-40 opacity-0 pointer-events-none transition-all duration-1000 pb-12 bg-black/90">
    
    <!-- Running Couple Animation Container -->
    <div id="running-couple-container" class="absolute inset-0 flex flex-col justify-end items-center pointer-events-none select-none opacity-0 transition-opacity duration-[1500ms] z-10">
      
      <!-- Big glowing moon (round transition to heart) -->
      <div class="absolute top-[22%] left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 z-0 flex items-center justify-center">
        <!-- Round moon -->
        <div id="moon-round" class="absolute w-44 h-44 rounded-full bg-gradient-to-b from-yellow-100 to-amber-200/30 shadow-[0_0_50px_rgba(253,224,71,0.25)] transition-opacity duration-[1500ms]"></div>
        <!-- Heart moon SVG -->
        <svg id="moon-heart" class="absolute w-44 h-44 fill-yellow-100/25 stroke-yellow-200 stroke-[1.5] drop-shadow-[0_0_40px_rgba(253,224,71,0.45)] transition-opacity duration-[1500ms] opacity-0" viewBox="0 0 100 100">
          <path d="M 50 18 C 35 0, 10 10, 10 42 C 10 68, 50 90, 50 90 C 50 90, 90 68, 90 42 C 90 10, 65 0, 50 18 Z" />
        </svg>
      </div>

      <!-- Two boys running silhouette SVG -->
      <div class="relative w-64 h-36 mb-20 flex items-end justify-center z-20">
        <svg class="w-36 h-36 drop-shadow-[0_0_12px_rgba(255,117,143,0.8)]" viewBox="0 0 100 100">
          <g class="animate-chibi-bob">
            <!-- Boy 1 (Left - Pink theme) Body & Head -->
            <circle cx="35" cy="35" r="9" fill="#ff758f" />
            <path d="M 35 44 L 35 66" stroke="#ff758f" stroke-width="5" stroke-linecap="round" />
            <!-- Boy 1 Left Arm -->
            <path d="M 35 48 L 22 58" stroke="#ff758f" stroke-width="4.5" stroke-linecap="round" />
            
            <!-- Boy 2 (Right - Cyan theme) Body & Head -->
            <circle cx="65" cy="35" r="9" fill="#06b6d4" />
            <path d="M 65 44 L 65 66" stroke="#06b6d4" stroke-width="5" stroke-linecap="round" />
            <!-- Boy 2 Right Arm -->
            <path d="M 65 48 L 78 58" stroke="#06b6d4" stroke-width="4.5" stroke-linecap="round" />

            <!-- Holding Hands (Connected arms) -->
            <path d="M 35 48 Q 50 56 65 48" fill="none" stroke="#ff758f" stroke-width="4.5" stroke-linecap="round" />
            
            <!-- Pulsing love heart emoji in between -->
            <text id="chibi-love-heart" x="50" y="52" font-size="9" text-anchor="middle" fill="#ff758f" class="opacity-0 transition-opacity duration-1000">❤️</text>
          </g>
          
          <!-- Running Legs -->
          <!-- Boy 1 Legs -->
          <g class="animate-leg-left">
            <path d="M 35 66 L 24 86" stroke="#ff758f" stroke-width="5.5" stroke-linecap="round" />
          </g>
          <g class="animate-leg-right">
            <path d="M 35 66 L 46 86" stroke="#ff758f" stroke-width="5.5" stroke-linecap="round" />
          </g>
          
          <!-- Boy 2 Legs -->
          <g class="animate-leg-right-boy2">
            <path d="M 65 66 L 54 86" stroke="#06b6d4" stroke-width="5.5" stroke-linecap="round" />
          </g>
          <g class="animate-leg-left-boy2">
            <path d="M 65 66 L 76 86" stroke="#06b6d4" stroke-width="5.5" stroke-linecap="round" />
          </g>
        </svg>
      </div>

      <!-- Scrolling Road Hill -->
      <div class="w-full h-24 bg-gradient-to-t from-[#090514] to-[#1d0a2d] border-t-2 border-sweetpink/20 relative z-10 flex items-center justify-center overflow-hidden">
        <!-- Dashed white center line that scrolls -->
        <div class="w-[200%] h-1.5 border-t-2 border-dashed border-white/20 absolute top-1/2 animate-road-scroll"></div>
      </div>
    </div>

    <!-- Finale: Heart Fireworks Canvas -->
    <canvas id="finale-fireworks-canvas" class="absolute inset-0 w-full h-full pointer-events-none z-20 opacity-0 transition-opacity duration-1000"></canvas>

    <!-- Finale: Glowing Love Message Overlay -->
    <div id="finale-love-overlay" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-25 opacity-0 transition-opacity duration-[2000ms] px-6">
      <!-- Big glowing heart icon burst -->
      <div id="finale-heart-burst" class="text-7xl mb-5 opacity-0 transition-all duration-700" style="filter: drop-shadow(0 0 30px rgba(255,117,143,0.9));">💖</div>
      <!-- Main message -->
      <h1 class="finale-love-text text-3xl md:text-4xl font-black text-center leading-tight mb-3" style="font-family: 'Outfit', sans-serif; opacity: 0; transition: opacity 1.5s 0.5s;" id="finale-main-text">Mãi mãi bên nhau</h1>
      <!-- Sub message -->
      <p class="finale-sub-text text-center text-sweetpink/90 font-semibold text-sm md:text-base mt-2 tracking-widest" style="opacity:0; transition: opacity 1.5s 1.2s; text-shadow: 0 0 12px rgba(255,117,143,0.8);" id="finale-sub-text">Dù trời đất có đổi thay, anh vẫn chọn em 🌙</p>
      <!-- Floating hearts row -->
      <div id="finale-hearts-row" class="flex gap-3 mt-6 text-2xl opacity-0 transition-opacity duration-[2000ms]" style="transition-delay: 2s;">💗 💜 💗 💜 💗</div>
    </div>

    <!-- Replay button absolute at bottom -->
    <button id="replay-btn" class="text-xs text-sweetpink/80 hover:text-sweetpink hover:underline font-semibold flex items-center gap-1.5 z-50 bg-black/40 px-4 py-2 rounded-full border border-sweetpink/25">
      <span>🔄 Xem lại từ đầu</span>
    </button>
  </div>

  <!-- JavaScript Code Section -->
  <script>
    // ==========================================
    // CẤU HÌNH TRANG WEB - DỄ DÀNG THAY ĐỔI
    // ==========================================
    const CONFIG = {
      // 1. Tên người nhận lời tỏ tình
      targetName: "Võ Tuấn Thơm",
      
      // 2. Lời nhắn hiển thị trên bức thư ban đầu (Giai đoạn 1)
      envelopeTitle: "Gửi người quan trọng nhất...",
      
      // 3. Đường dẫn ảnh của người ấy ở giai đoạn 2
      // Có thể dùng ảnh cá nhân từ Imgur, Facebook, Google Drive (lấy link trực tiếp)
      photoUrl: "https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=600",
      
      // 4. Nhạc nền lãng mạn nhẹ nhàng (Sử dụng tệp nhạc địa phương Tìm Em.mp3)
      musicUrl: "Tìm Em.mp3",
      
      // 5. Câu tỏ tình viết tay tự động chạy (Giai đoạn 2)
      confessionText: "Gửi em Thơm, Cảm ơn vì đã xuất hiện trong cuộc đời anh! Mỗi giây phút ở bên em đều là những khoảnh khắc tuyệt vời nhất đối với anh. Làm người yêu anh nhé? ❤️",
      
      // 6. Tiêu đề và lời nhắn sau khi người ấy ấn "ĐỒNG Ý" (Giai đoạn 3)
      successTitle: "Anh biết ngay mà! 🥰",
      successText: "Tối nay 7h anh qua đón em đi chơi nhé! Chuẩn bị đẹp trai nha em yêu! ❤️",
      
      // 7. Ảnh động GIF hiển thị ở màn hình thành công
      successGifUrl: "https://media.tenor.com/gO1Rl9Z5eqAAAAAi/peach-goma.gif"
    };

    let isSuccessState = false;

    // ==========================================
    // KHỞI TẠO TÀI NGUYÊN
    // ==========================================
    document.getElementById('target-name-placeholder').textContent = CONFIG.targetName;
    document.getElementById('envelope-inside-text').textContent = CONFIG.envelopeTitle;
    document.getElementById('target-photo').src = CONFIG.photoUrl;

    // Tự động thiết lập mã QR trỏ đến trang hiện tại
    const currentUrl = window.location.href;
    document.getElementById('qr-code-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(currentUrl)}`;

    const bgMusic = document.getElementById('bg-music');
    bgMusic.src = CONFIG.musicUrl;
    bgMusic.volume = 0.65;

    // ==========================================
    // CANVAS 1: SAO BĂNG & SAO ĐÊM (Background)
    // ==========================================
    const meteorCanvas = document.getElementById('meteor-canvas');
    const mCtx = meteorCanvas.getContext('2d');
    let screenWidth = window.innerWidth;
    let screenHeight = window.innerHeight;

    meteorCanvas.width = screenWidth;
    meteorCanvas.height = screenHeight;

    window.addEventListener('resize', () => {
      screenWidth = window.innerWidth;
      screenHeight = window.innerHeight;
      meteorCanvas.width = screenWidth;
      meteorCanvas.height = screenHeight;
      trailCanvas.width = screenWidth;
      trailCanvas.height = screenHeight;
      fireworksCanvas.width = screenWidth;
      fireworksCanvas.height = screenHeight;
    });

    // Không gian 3D đầy sao (3D Starfield Warp Speed)
    const stars3D = [];
    const numStars3D = 180;
    const maxDepth = 1000;

    class Star3D {
      constructor() {
        this.reset();
        this.z = Math.random() * maxDepth;
      }

      reset() {
        this.x = (Math.random() - 0.5) * screenWidth * 2.5;
        this.y = (Math.random() - 0.5) * screenHeight * 2.5;
        this.z = maxDepth;
        this.size = 0.5 + Math.random() * 1.5;
        const colors = ['#ffffff', '#ffebf0', '#e0f7fc', '#fef9c3', '#ffd1dc'];
        this.color = colors[Math.floor(Math.random() * colors.length)];
      }

      update() {
        const speed = isSuccessState ? 5.0 : 1.2;
        this.z -= speed;
        if (this.z <= 0) {
          this.reset();
        }
      }

      draw() {
        const k = 140 / this.z;
        const px = screenWidth / 2 + this.x * k;
        const py = screenHeight / 2 + this.y * k;

        if (px < 0 || px > screenWidth || py < 0 || py > screenHeight) {
          this.reset();
          return;
        }

        const size = (1 - this.z / maxDepth) * this.size * 3.5;
        const opacity = 1 - this.z / maxDepth;

        mCtx.save();
        mCtx.fillStyle = this.color;
        mCtx.globalAlpha = opacity;
        mCtx.beginPath();
        mCtx.arc(px, py, Math.max(0.3, size), 0, Math.PI * 2);
        mCtx.fill();
        mCtx.restore();
      }
    }

    for (let i = 0; i < numStars3D; i++) {
      stars3D.push(new Star3D());
    }

    let isEnvelopeOpened = false;

    // Class Các hạt bay khắp thiên hà (Galaxy Particle: Trái tim, Ngôi sao, Tinh vân, Sparkle)
    class GalaxyParticle {
      constructor(x, y) {
        this.reset();
        if (x !== undefined && y !== undefined) {
          this.x = x;
          this.y = y;
          this.speedY = 1.0 + Math.random() * 3.0; // Bay nhanh lên khi nổ ra
          this.wobbleSpeed = 0.04 + Math.random() * 0.04;
        } else {
          this.y = Math.random() * screenHeight; // Khởi tạo ngẫu nhiên vị trí ban đầu
        }
      }

      reset() {
        this.x = Math.random() * screenWidth;
        this.y = screenHeight + 20;
        this.size = 6 + Math.random() * 12;
        this.speedY = 0.3 + Math.random() * 0.9;
        this.wobble = Math.random() * Math.PI * 2;
        this.wobbleSpeed = 0.01 + Math.random() * 0.025;
        this.opacity = 0.1 + Math.random() * 0.45;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.02;
        
        // Phân loại hạt bay: trái tim, ngôi sao, hành tinh, hạt sáng lấp lánh
        const types = ['heart', 'star', 'planet', 'sparkle'];
        this.type = types[Math.floor(Math.random() * types.length)];
        
        const colors = [
          'rgba(255, 117, 143, ', // hồng ngọt ngào
          'rgba(6, 182, 212, ',  // xanh neon
          'rgba(192, 132, 252, ', // tím nhạt
          'rgba(253, 224, 71, '   // vàng lấp lánh
        ];
        this.color = colors[Math.floor(Math.random() * colors.length)];
      }

      update() {
        this.y -= this.speedY;
        this.wobble += this.wobbleSpeed;
        this.x += Math.sin(this.wobble) * 0.3;
        this.rotation += this.rotationSpeed;
        if (this.y < -20) {
          this.reset();
        }
      }

      draw() {
        mCtx.save();
        mCtx.fillStyle = this.color + this.opacity + ')';
        mCtx.shadowBlur = 8;
        mCtx.shadowColor = this.color + '0.8)';
        
        mCtx.translate(this.x, this.y);
        mCtx.rotate(this.rotation);

        if (this.type === 'heart') {
          mCtx.beginPath();
          const topCurveHeight = this.size * 0.3;
          mCtx.moveTo(0, topCurveHeight);
          mCtx.bezierCurveTo(-this.size/2, -this.size/2, -this.size, this.size/3, 0, this.size);
          mCtx.bezierCurveTo(this.size, this.size/3, this.size/2, -this.size/2, 0, topCurveHeight);
          mCtx.fill();
        } else if (this.type === 'star') {
          // Vẽ ngôi sao 5 cánh
          mCtx.beginPath();
          for (let i = 0; i < 5; i++) {
            mCtx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * this.size,
                        Math.sin((18 + i * 72) * Math.PI / 180) * this.size);
            mCtx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * (this.size/2),
                        Math.sin((54 + i * 72) * Math.PI / 180) * (this.size/2));
          }
          mCtx.closePath();
          mCtx.fill();
        } else if (this.type === 'planet') {
          // Vẽ hành tinh nhỏ có vành đai tinh vân
          mCtx.beginPath();
          mCtx.arc(0, 0, this.size * 0.6, 0, Math.PI * 2);
          mCtx.fill();
          // Vành đai tinh vân bao quanh
          mCtx.strokeStyle = this.color + (this.opacity * 1.5) + ')';
          mCtx.lineWidth = 1.5;
          mCtx.beginPath();
          mCtx.ellipse(0, 0, this.size, this.size * 0.3, Math.PI / 6, 0, Math.PI * 2);
          mCtx.stroke();
        } else {
          // Hạt sáng lấp lánh (Sparkle) 4 cánh
          mCtx.beginPath();
          mCtx.moveTo(0, -this.size);
          mCtx.lineTo(this.size * 0.2, -this.size * 0.2);
          mCtx.lineTo(this.size, 0);
          mCtx.lineTo(this.size * 0.2, this.size * 0.2);
          mCtx.lineTo(0, this.size);
          mCtx.lineTo(-this.size * 0.2, this.size * 0.2);
          mCtx.lineTo(-this.size, 0);
          mCtx.lineTo(-this.size * 0.2, -this.size * 0.2);
          mCtx.closePath();
          mCtx.fill();
        }
        
        mCtx.restore();
      }
    }

    const floatingHearts = [];
    const numFloatingHearts = 45; // Tăng lên 45 hạt bay trong thiên hà nền
    for (let i = 0; i < numFloatingHearts; i++) {
      floatingHearts.push(new GalaxyParticle());
    }



    // Class Đom đóm bay tự do (Firefly)
    class Firefly {
      constructor() {
        this.reset();
        // Cho đom đóm xuất hiện ngẫu nhiên ban đầu khắp màn hình
        this.x = Math.random() * screenWidth;
        this.y = Math.random() * screenHeight;
      }

      reset() {
        this.x = Math.random() * screenWidth;
        this.y = screenHeight + 10;
        this.size = 1.2 + Math.random() * 1.8;
        this.speedX = (Math.random() - 0.5) * 0.8;
        this.speedY = -(0.3 + Math.random() * 0.6); // Bay chậm lên trên
        this.angle = Math.random() * Math.PI * 2;
        this.angleSpeed = 0.01 + Math.random() * 0.02;
        this.opacity = 0.2 + Math.random() * 0.8;
        this.blinkSpeed = 0.008 + Math.random() * 0.015;
        this.glow = 3 + Math.random() * 5;
      }

      update() {
        this.angle += this.angleSpeed;
        this.x += this.speedX + Math.sin(this.angle) * 0.3;
        this.y += this.speedY;

        // Lấp lánh bập bùng
        this.opacity += this.blinkSpeed;
        if (this.opacity > 1 || this.opacity < 0.1) {
          this.blinkSpeed = -this.blinkSpeed;
        }

        // Tái tạo khi bay ra ngoài
        if (this.x < -10 || this.x > screenWidth + 10 || this.y < -10) {
          this.reset();
        }
      }

      draw() {
        mCtx.save();
        mCtx.fillStyle = `rgba(234, 255, 140, ${Math.abs(this.opacity)})`; // Màu đom đóm vàng chanh neon
        mCtx.shadowBlur = this.glow;
        mCtx.shadowColor = 'rgba(234, 255, 140, 0.8)';
        mCtx.beginPath();
        mCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        mCtx.fill();
        mCtx.restore();
      }
    }

    const fireflies = [];
    const numFireflies = 45; // Số lượng đom đóm bay khắp màn hình
    for (let i = 0; i < numFireflies; i++) {
      fireflies.push(new Firefly());
    }

    // Vòng lặp vẽ hình nền 3D
    function animateBackground() {
      mCtx.fillStyle = 'rgba(11, 12, 16, 0.2)'; // Xóa màn hình tạo vệt
      mCtx.fillRect(0, 0, screenWidth, screenHeight);

      // Vẽ không gian 3D đầy sao (Starfield Warp Speed)
      stars3D.forEach(star => {
        star.update();
        star.draw();
      });

      // Vẽ và cập nhật đom đóm bay khắp bản đồ
      fireflies.forEach(firefly => {
        firefly.update();
        firefly.draw();
      });

      // Vẽ và cập nhật trái tim bay (chỉ khi thư đã mở)
      if (isEnvelopeOpened) {
        floatingHearts.forEach(heart => {
          heart.update();
          heart.draw();
        });
      }

      requestAnimationFrame(animateBackground);
    }
    animateBackground();


    // ==========================================
    // CANVAS 2: HIỆU ỨNG TƯƠNG TÁC CHẠM (Touch Trail)
    // ==========================================
    const trailCanvas = document.getElementById('trail-canvas');
    const tCtx = trailCanvas.getContext('2d');
    trailCanvas.width = screenWidth;
    trailCanvas.height = screenHeight;

    const trailParticles = [];

    class TrailParticle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.size = 6 + Math.random() * 8;
        this.speedX = (Math.random() - 0.5) * 4;
        this.speedY = (Math.random() - 0.5) * 4 - 1; // Bay nhẹ lên trên
        this.life = 1;
        this.decay = 0.015 + Math.random() * 0.02;
        
        // Màu sắc rực rỡ neon ngẫu nhiên
        const colors = [
          'rgba(255, 117, 143, ', // hồng ngọt ngào
          'rgba(6, 182, 212, ',  // xanh neon
          'rgba(192, 132, 252, ', // tím nhạt
          'rgba(244, 63, 94, '   // đỏ hoa hồng
        ];
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.type = Math.random() > 0.5 ? 'star' : 'heart';
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.life -= this.decay;
        if (this.size > 0.5) this.size -= 0.1;
      }

      draw() {
        tCtx.save();
        tCtx.fillStyle = this.color + this.life + ')';
        tCtx.shadowBlur = 10;
        tCtx.shadowColor = this.color.replace('rgba', 'rgb').split(',').slice(0, 3).join(',') + ')';

        if (this.type === 'heart') {
          // Vẽ hình trái tim nhỏ từ đầu ngón tay
          tCtx.beginPath();
          const topCurveHeight = this.size * 0.3;
          tCtx.moveTo(this.x, this.y + topCurveHeight);
          // Nửa bên trái
          tCtx.bezierCurveTo(
            this.x - this.size / 2, this.y - this.size / 2,
            this.x - this.size, this.y + this.size / 3,
            this.x, this.y + this.size
          );
          // Nửa bên phải
          tCtx.bezierCurveTo(
            this.x + this.size, this.y + this.size / 3,
            this.x + this.size / 2, this.y - this.size / 2,
            this.x, this.y + topCurveHeight
          );
          tCtx.fill();
        } else {
          // Vẽ ngôi sao 4 cánh lấp lánh
          tCtx.beginPath();
          tCtx.moveTo(this.x, this.y - this.size);
          tCtx.lineTo(this.x + this.size * 0.3, this.y - this.size * 0.3);
          tCtx.lineTo(this.x + this.size, this.y);
          tCtx.lineTo(this.x + this.size * 0.3, this.y + this.size * 0.3);
          tCtx.lineTo(this.x, this.y + this.size);
          tCtx.lineTo(this.x - this.size * 0.3, this.y + this.size * 0.3);
          tCtx.lineTo(this.x - this.size, this.y);
          tCtx.lineTo(this.x - this.size * 0.3, this.y - this.size * 0.3);
          tCtx.closePath();
          tCtx.fill();
        }
        tCtx.restore();
      }
    }

    function addTrail(clientX, clientY) {
      // Spawn nhiều hạt một lúc để hiệu ứng dày và đẹp hơn
      const count = 3;
      for (let i = 0; i < count; i++) {
        trailParticles.push(new TrailParticle(clientX, clientY));
      }
    }

    // Lắng nghe chuột trên máy tính
    window.addEventListener('mousemove', (e) => {
      addTrail(e.clientX, e.clientY);
    });

    // Lắng nghe chạm vuốt trên di động
    window.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) {
        addTrail(e.touches[0].clientX, e.touches[0].clientY);
      }
    }, { passive: true });

    window.addEventListener('touchstart', (e) => {
      if (e.touches.length > 0) {
        addTrail(e.touches[0].clientX, e.touches[0].clientY);
      }
    }, { passive: true });

    // Vòng lặp vẽ touch trail
    function animateTrail() {
      tCtx.clearRect(0, 0, screenWidth, screenHeight);

      for (let i = trailParticles.length - 1; i >= 0; i--) {
        const p = trailParticles[i];
        p.update();
        if (p.life <= 0) {
          trailParticles.splice(i, 1);
        } else {
          p.draw();
        }
      }
      requestAnimationFrame(animateTrail);
    }
    animateTrail();


    // ==========================================
    // CANVAS 3: PHÁO HOA TRÁI TIM (Khi Đồng Ý)
    // ==========================================
    const fireworksCanvas = document.getElementById('fireworks-canvas');
    const fCtx = fireworksCanvas.getContext('2d');
    fireworksCanvas.width = screenWidth;
    fireworksCanvas.height = screenHeight;

    const successParticles = [];
    const textPoints1 = [];
    const textPoints2 = [];
    let successFrameCount = 0;

    // Class Hạt sáng thiên hà morph chữ (Success Particle)
    class SuccessParticle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.startX = x;
        this.startY = y;
        this.targetX1 = x;
        this.targetY1 = y;
        this.targetX2 = x;
        this.targetY2 = y;
        
        this.size = 1.0 + Math.random() * 1.8;
        this.opacity = 0.2 + Math.random() * 0.8;
        this.blinkSpeed = 0.015 + Math.random() * 0.025;
        
        const colors = [
          'rgba(255, 117, 143, ', // hồng ngọt ngào
          'rgba(6, 182, 212, ',  // xanh neon
          'rgba(192, 132, 252, ', // tím nhạt
          'rgba(253, 224, 71, '   // vàng hoàng kim
        ];
        this.color = colors[Math.floor(Math.random() * colors.length)];
        
        // Thiên hà xoáy
        this.angle = Math.random() * Math.PI * 2;
        this.radius = 120 + Math.random() * (Math.max(screenWidth, screenHeight) * 0.45);
        this.rotSpeed = 0.015 + Math.random() * 0.02;
        this.radialSpeed = 0.5 + Math.random() * 1.2;
        
        this.vx = 0;
        this.vy = 0;
      }

      update(time) {
        if (time < 120) {
          // Giai đoạn 1: Xoáy thiên hà
          this.angle += this.rotSpeed;
          this.radius -= this.radialSpeed;
          if (this.radius < 5) {
            this.radius = 100 + Math.random() * 300;
          }
          this.x = screenWidth / 2 + Math.cos(this.angle) * this.radius;
          this.y = screenHeight / 2 + Math.sin(this.angle) * this.radius;
          
          this.opacity += this.blinkSpeed;
          if (this.opacity > 1 || this.opacity < 0.2) {
            this.blinkSpeed = -this.blinkSpeed;
          }
        } else if (time >= 120 && time < 220) {
          // Giai đoạn 2: Biến thành sao băng bay về chữ 1 "anh yêu em lắm ớ"
          if (time === 120) {
            this.morphStartX = this.x;
            this.morphStartY = this.y;
          }
          const progress = (time - 120) / 100; // 100 frames morph
          const ease = progress * progress * (3 - 2 * progress); // smoothstep
          this.x = this.morphStartX + (this.targetX1 - this.morphStartX) * ease;
          this.y = this.morphStartY + (this.targetY1 - this.morphStartY) * ease;
          this.opacity = 0.95;
        } else if (time >= 220 && time < 360) {
          // Giai đoạn 3: Giữ chữ 1 lấp lánh
          this.x = this.targetX1 + (Math.random() - 0.5) * 0.5;
          this.y = this.targetY1 + (Math.random() - 0.5) * 0.5;
          
          this.opacity += this.blinkSpeed;
          if (this.opacity > 1 || this.opacity < 0.3) {
            this.blinkSpeed = -this.blinkSpeed;
          }
        } else if (time >= 360 && time < 400) {
          // Giai đoạn 4: NỔ TUNG! (Explosion)
          if (time === 360) {
            const angle = Math.random() * Math.PI * 2;
            const force = 3.0 + Math.random() * 7.0;
            this.vx = Math.cos(angle) * force;
            this.vy = Math.sin(angle) * force;
          }
          this.x += this.vx;
          this.y += this.vy;
          this.vx *= 0.95;
          this.vy *= 0.95;
        } else if (time >= 400 && time < 500) {
          // Giai đoạn 5: Biến thành sao băng bay về chữ 2 "làm người yêu anh nha cục dàng"
          if (time === 400) {
            this.morphStartX2 = this.x;
            this.morphStartY2 = this.y;
          }
          const progress = (time - 400) / 100;
          const ease = progress * progress * (3 - 2 * progress);
          this.x = this.morphStartX2 + (this.targetX2 - this.morphStartX2) * ease;
          this.y = this.morphStartY2 + (this.targetY2 - this.morphStartY2) * ease;
          this.opacity = 0.95;
        } else if (time >= 500 && time < 660) {
          // Giai đoạn 6: Giữ chữ 2 lấp lánh
          this.x = this.targetX2 + (Math.random() - 0.5) * 0.5;
          this.y = this.targetY2 + (Math.random() - 0.5) * 0.5;
          
          this.opacity += this.blinkSpeed;
          if (this.opacity > 1 || this.opacity < 0.3) {
            this.blinkSpeed = -this.blinkSpeed;
          }
        } else {
          // Giai đoạn 7: Mờ dần biến mất nhường chỗ cho cặp đôi chạy 2D
          this.opacity -= 0.015;
          if (this.opacity < 0) this.opacity = 0;
          this.x -= 0.5; // trôi ngang nhẹ theo bầu trời
        }
      }

      draw(time) {
        fCtx.save();
        fCtx.fillStyle = this.color + Math.abs(this.opacity) + ')';
        
        // Tạo glow phát sáng
        fCtx.shadowBlur = this.size * 2.5;
        fCtx.shadowColor = this.color.replace('rgba', 'rgb').split(',').slice(0,3).join(',') + ')';

        // Vẽ vệt sao băng ở giai đoạn morph 1 & morph 2
        if ((time >= 120 && time < 220) || (time >= 400 && time < 500)) {
          const targetX = time < 220 ? this.targetX1 : this.targetX2;
          const targetY = time < 220 ? this.targetY1 : this.targetY2;
          
          fCtx.strokeStyle = this.color + (this.opacity * 0.4) + ')';
          fCtx.lineWidth = this.size * 0.7;
          fCtx.beginPath();
          const angleRad = Math.atan2(targetY - this.y, targetX - this.x);
          fCtx.moveTo(this.x, this.y);
          fCtx.lineTo(this.x - Math.cos(angleRad) * 16, this.y - Math.sin(angleRad) * 16);
          fCtx.stroke();
        }

        fCtx.beginPath();
        fCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        fCtx.fill();
        fCtx.restore();
      }
    }

    // Quét điểm tạo chữ hỗ trợ vẽ nhiều dòng
    function sampleTextPoints(text, targetArray) {
      const offCanvas = document.createElement('canvas');
      const oCtx = offCanvas.getContext('2d');
      offCanvas.width = screenWidth;
      offCanvas.height = screenHeight;
      oCtx.fillStyle = '#ffffff';
      
      // Kích cỡ chữ to rõ
      const fontSize = Math.min(38, Math.floor(screenWidth / 8));
      oCtx.font = `bold ${fontSize}px "Outfit", "Playpen Sans", sans-serif`;
      oCtx.textAlign = "center";
      oCtx.textBaseline = "middle";
      
      if (text.includes('\n')) {
        const lines = text.split('\n');
        oCtx.fillText(lines[0], screenWidth / 2, screenHeight / 2 - fontSize * 0.65);
        oCtx.fillText(lines[1], screenWidth / 2, screenHeight / 2 + fontSize * 0.65);
      } else {
        oCtx.fillText(text, screenWidth / 2, screenHeight / 2);
      }
      
      const imgData = oCtx.getImageData(0, 0, screenWidth, screenHeight).data;
      targetArray.length = 0;
      
      // Quét mật độ dày gấp đôi để nét chữ cực kì sắc nét
      const step = screenWidth < 500 ? 2.5 : 3.5;
      for (let y = 0; y < screenHeight; y += step) {
        for (let x = 0; x < screenWidth; x += step) {
          const idx = (Math.floor(y) * screenWidth + Math.floor(x)) * 4;
          if (imgData[idx + 3] > 100) {
            targetArray.push({ x: x, y: y });
          }
        }
      }
    }

    class HeartFireworkParticle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = 2.0 + Math.random() * 5.5;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.size = 1.2 + Math.random() * 3.2;
        this.life = 1.0;
        this.decay = 0.012 + Math.random() * 0.018;
        this.gravity = 0.08;
        const palette = [
          'rgba(255,117,143,', 'rgba(255,182,210,', 'rgba(192,132,252,',
          'rgba(253,224,71,',  'rgba(6,182,212,',  'rgba(255,255,255,'
        ];
        this.color = palette[Math.floor(Math.random() * palette.length)];
        // Some particles are heart-shaped (emoji)
        this.isHeart = Math.random() < 0.12;
        this.heartEmoji = ['❤️','💗','💜','💛','✨','🌸'][Math.floor(Math.random() * 6)];
        this.emoji_scale = 0.6 + Math.random() * 0.8;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += this.gravity;
        this.vx *= 0.97;
        this.life -= this.decay;
      }
      draw() {
        if (this.isHeart) {
          finCtx.save();
          finCtx.globalAlpha = Math.max(0, this.life);
          finCtx.font = `${this.emoji_scale * 22}px serif`;
          finCtx.fillText(this.heartEmoji, this.x, this.y);
          finCtx.restore();
        } else {
          finCtx.save();
          finCtx.globalAlpha = Math.max(0, this.life);
          finCtx.shadowBlur = this.size * 3;
          finCtx.shadowColor = this.color + '0.9)';
          finCtx.fillStyle = this.color + this.life + ')';
          finCtx.beginPath();
          finCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          finCtx.fill();
          finCtx.restore();
        }
      }
    }

    function shootHeartFirework(x, y, count) {
      for (let i = 0; i < count; i++) {

      });
      const chibiGroup = document.querySelector('.animate-chibi-bob');
      if (chibiGroup) {
        chibiGroup.style.animation = '';
      }

      // Đặt lại style nút từ chối
      noBtn.style.display = 'block';
      noBtn.style.position = 'static';
      noBtn.style.transform = 'scale(1)';
      noBtn.style.left = 'auto';
      noBtn.style.top = 'auto';
      
      gsap.set(yesBtn, { scale: 1 });
      gsap.set(noBtn, { scale: 1, opacity: 1 });

      // Chuyển cảnh về Hook
      gsap.timeline()
        .to(successView, {
          opacity: 0,
          duration: 0.6,
          onComplete: () => {
            successView.classList.add('hidden');
            mainEnvelope.classList.remove('open');
            hookView.classList.remove('hidden');
            
            // Dừng nhạc
            bgMusic.pause();
            bgMusic.currentTime = 0;
            
            document.body.classList.remove('story-bg');
            document.body.classList.add('dynamic-bg');
          }
        })
        .to(hookView, {
          opacity: 1,
          scale: 1,
          duration: 0.6,
          onComplete: () => {
            playCarrierIntro();
          }
        });
    });

    // Tải xong trang web thì chạy hoạt ảnh chim mang thư tới
    window.addEventListener('load', () => {
      // Nhỏ volume nhạc và nạp link
      bgMusic.volume = 0.5;
      playCarrierIntro();
    });
  </script>
</body>
</html>
